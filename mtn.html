<!DOCTYPE html>
<html>
<head>
<title>MTN - BEST PRIZE DATA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="BANNER.png" type="image/x-icon">
<style>
body{margin:0;font-family:Arial;background:#ffcc00;}
nav{display:flex;justify-content:space-between;padding:15px 20px;background:black;color:white;}
nav a{color:white;text-decoration:none;margin-left:15px;}
.container{max-width:500px;margin:20px auto;background:white;padding:20px;border-radius:10px;}
.logo{text-align:center;}
.logo img{width:200px;}
.notice{background:black;color:white;padding:10px;text-align:center;font-size:14px;}
input, select, textarea{width:100%;padding:12px;margin-top:10px;box-sizing:border-box;}
.bundles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:15px;}
.bundle-btn{padding:10px;border:none;background:black;color:white;cursor:pointer;}
.bundle-btn.active{background:green;}
.submit-btn{width:100%;padding:15px;margin-top:20px;background:#25D366;color:white;border:none;cursor:pointer;}
@media(max-width:600px){.bundles{grid-template-columns:1fr;}}
</style>
</head>
<body>

<nav>
    <div>MTN DATA</div>
    <div>
        <a href="index.html">Home</a>
        <a href="telecel.html">Telecel</a>
    </div>
</nav>

<div class="notice">
⚠ Orders may delay slightly. You will receive when it reaches your turn.
</div>

<div class="container">

<div class="logo">
<img src="New-mtn-logo-1.jpg.webp">
</div>

<input type="text" id="name" placeholder="Full Name" required>
<input type="text" id="phone" placeholder="MTN Number" required>
<input type="text" id="whatsapp" placeholder="WhatsApp Number (optional)">
<h3>Select Bundle</h3>
<div class="bundles">
<button class="bundle-btn" onclick="selectBundle(this,'1GB - 5 GHS',500)">1GB - 5 GHS</button>
<button class="bundle-btn" onclick="selectBundle(this,'2GB - 9.50 GHS',950)">2GB - 9.50 GHS</button>
<button class="bundle-btn" onclick="selectBundle(this,'3GB - 14.50 GHS',1450)">3GB - 14.50 GHS</button>
<button class="bundle-btn" onclick="selectBundle(this,'5GB - 24 GHS',2400)">5GB - 24 GHS</button>
<button class="bundle-btn" onclick="selectBundle(this,'10GB - 45 GHS',4500)">10GB - 45 GHS</button>
<button class="bundle-btn" onclick="selectBundle(this,'20GB - 85 GHS',8500)">20GB - 85 GHS</button>
</div>

<button class="submit-btn" onclick="payWithPaystack()">Pay & Place Order</button>

</div>

<!-- Paystack & EmailJS -->
<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
// Initialize EmailJS
emailjs.init("pi2bmfpD8_AQ3JkXl"); // Your Public Key

let selectedBundle="";
let amount=0;

function selectBundle(btn, bundleName, bundleAmount){
    selectedBundle=bundleName;
    amount=bundleAmount;
    document.querySelectorAll(".bundle-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
}

function payWithPaystack(){
    const name=document.getElementById("name").value.trim();
    const phone=document.getElementById("phone").value.trim();
    const whatsapp=document.getElementById("whatsapp").value.trim();

    if(name=="" || phone=="" || selectedBundle==""){
        alert("Please complete all fields and select a bundle.");
        return;
    }

    var handler = PaystackPop.setup({
        key: 'pk_test_82f0f47663bd020f9a3e4af947d6493495e70166',
        email: phone+'@proofage.com',
        amount: amount,
        currency: "GHS",
        ref: 'DATA_'+Math.floor((Math.random()*1000000000)+1),
        metadata: {
            custom_fields: [
                {display_name: "Customer Name", variable_name: "name", value: name},
                {display_name: "Phone Number", variable_name: "phone", value: phone},
                {display_name: "Bundle", variable_name: "bundle", value: selectedBundle},
                {display_name: "WhatsApp", variable_name: "whatsapp", value: whatsapp}
            ]
        },
        callback: function(response){
            // Send EmailJS email after payment
            emailjs.send("service_nikspbt", "template_nunmsyu", {
                fullname: name,
                phonenumber: phone,
                bundle: selectedBundle,
                whatsapp: whatsapp,
                reference: response.reference
            }).then(function(){
                alert("Payment successful! Order details sent to your email.");
            }).catch(function(){
                alert("Payment successful but email failed. Check EmailJS setup.");
            });
        },
        onClose: function(){
            alert('Transaction was not completed.');
        }
    });
    handler.openIframe();
}
</script>

</body>
</html>
