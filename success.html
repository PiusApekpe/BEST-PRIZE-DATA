<!DOCTYPE html>
<html>
<head>
<title>Payment Successful | BEST PRIZE DATA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0044ff,#00aaff);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:#333;
}

.card {
    background:white;
    padding:30px 40px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    max-width:400px;
    width:90%;
    text-align:center;
    animation:fadeIn 1s ease-in-out;
}

.card h2 {
    color:#0044ff;
    margin-bottom:15px;
    font-size:24px;
}

.card p {
    font-size:16px;
    margin:10px 0;
}

.card span {
    font-weight:bold;
    color:#002ea6;
}

.button {
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#0044ff;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
    transition:0.3s;
}

.button:hover {
    background:#002ea6;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(-20px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>
<body>

<div class="card">
    <h2>Payment Successful 🎉</h2>
    <p>Thank you, your order has been received.</p>
    <p>Bundle: <span id="bundle"></span></p>
    <p>Phone Number: <span id="phone"></span></p>
    <p>Payment Reference: <span id="ref"></span></p>
    <a href="index.html" class="button">Back to Home</a>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
document.getElementById('bundle').innerText = urlParams.get('bundle');
document.getElementById('phone').innerText = urlParams.get('phone');
document.getElementById('ref').innerText = urlParams.get('ref');
</script>

</body>
</html>
