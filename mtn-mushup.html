<html>

<style>
*{box-sizing:border-box;}
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:linear-gradient(135deg,#0044ff,#002ea6);
    padding-top:80px; /* offset for fixed nav */
}

/* NAVIGATION */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    background: rgba(0,0,0,0.85);
    position: fixed;
    top:0;
    width:100%;
    z-index:1000;
    flex-wrap:wrap;
}

.nav-left{
    display:flex;
    align-items:center;
    gap:10px;
}

.nav-left img{
    width:40px; 
    height:40px;
    object-fit:contain;
}

.nav-left h2{
    margin:0;
    font-size:20px;
    color:white;
}

.nav-right ul{
    list-style:none;
    display:flex;
    gap:20px;
    padding:0;
    margin:0;
    flex-wrap:wrap;
}

.nav-right ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.nav-right ul li a:hover{
    color:#ffe600;
}

/* CONTAINER */
.container{
    background:white;
    max-width:420px;
    width:100%;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
    opacity:0;
    transform: translateY(40px);
    animation: slideUp 0.8s forwards;
}

/* SLIDE-UP ANIMATION */
@keyframes slideUp{
    to{
        opacity:1;
        transform: translateY(0);
    }
}

.logo{width:70px;margin-bottom:10px;}
h2{margin-bottom:5px;color:#222;}
p{margin-bottom:20px;color:#666;}
.input-group{text-align:left;margin-bottom:15px;}
label{font-size:13px;font-weight:600;}
input,select{width:100%;padding:12px;margin-top:5px;border-radius:8px;border:1px solid #ddd;}
button{width:100%;padding:14px;background:#0044ff;color:white;border:none;border-radius:8px;font-weight:bold;cursor:pointer;transition:0.3s;}
button:hover{background:#002ea6;}
.secure{margin-top:15px;font-size:12px;color:#888;}
.footer{margin-top:25px;font-size:12px;color:#aaa;}

/* RESPONSIVE */
@media(max-width:480px){
    .nav-left h2{font-size:16px;}
    .logo{width:60px;}
}
</style>
</head>

<body>

<!-- NAVIGATION -->
<nav>
    <div class="nav-left">

<!-- FORM CONTAINER -->

<img src="New-mtn-logo-1.jpg.webp" class="logo">

<p>Data + Minutes + SMS</p>

<form id="mushupForm">
<div class="input-group">
<label>Phone Number</label>
<input type="text" id="phone" placeholder="e.g 024xxxxxxx" required>
</div>

<div class="input-group">
<label>Select Bundle</label>
<select id="amount" required>
<option value="">Choose Bundle</option>
<option value="500">5 GHS Bundle</option>
<option value="2000">20 GHS Bundle</option>

</select>
</div>

<div class="input-group">

<input type="text" id="whatsapp" placeholder="e.g 024xxxxxxx">
</div>

<button type="submit">Proceed to Payment</button>
</form>

<div class="secure">🔒 Secured by Paystack</div>
<div class="footer">© 2026 BEST PRIZE DATA</div>
</div>

<script>
// Initialize EmailJS
emailjs.init("pi2bmfpD8_AQ3JkXl"); 

// Paystack Payment
const paystackPublicKey="pk_test_82f0f47663bd020f9a3e4af947d6493495e70166";

document.getElementById("mushupForm").addEventListener("submit",function(e){
    e.preventDefault();

    let phone = document.getElementById("phone").value.trim();
    let amount = document.getElementById("amount").value;
    let whatsapp = document.getElementById("whatsapp").value.trim();

    if(!phone || !amount){
        alert("Please fill all required fields");
        return;
    }

    let handler = PaystackPop.setup({
        key:paystackPublicKey,
        email:phone+"@proofagedata.com",
        amount:amount,
        currency:"GHS",
        ref:"PROOFAGE_"+Math.floor(Math.random()*1000000000),

        callback:function(response){
            emailjs.send("service_nikspbt","template_nunmsyu",{
                fullname: phone,
                phonenumber: phone,
                bundle: amount + " GHS Mushup Bundle",
                whatsapp: whatsapp,
                reference: response.reference
            }).then(function(){
                alert("Payment successful! Order details sent to your email.");
            }).catch(function(){
                alert("Payment successful but email failed. Check EmailJS setup.");
            });
        },

        onClose:function(){
            alert("Transaction cancelled.");
        }
    });

    handler.openIframe();
});
</script>
</body>
</html>
